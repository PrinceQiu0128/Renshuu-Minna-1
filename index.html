<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Renshuu — Latihan Minna no Nihongo N5</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Noto+Serif+JP:wght@300;400;500;700&family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f9f4f2;--bg2:#ffffff;--bg3:#f2ece9;--border:#e8ddd8;--border2:#d4c8c2;
    --text:#1a0f0a;--text2:#4a3028;--text3:#8a6858;--text4:#baa898;
    --red:#d4231a;--red-light:#fdecea;--red-mid:#f0504a;
    --accent:#4f62e8;--accent-light:#eef0fd;
    --accent2:#e8376e;--accent2-light:#fdeef3;
    --green:#22c55e;--green-light:#dcfce7;
    --amber:#f59e0b;--amber-light:#fef3c7;
    --purple:#8b5cf6;--purple-light:#f5f3ff;
    --shadow:0 1px 3px rgba(0,0,0,0.06),0 4px 12px rgba(0,0,0,0.05);
    --shadow-lg:0 4px 24px rgba(0,0,0,0.1);
    --radius:14px;--radius-sm:10px;
  }
  [data-theme="dark"] {
    --bg:#100a08;--bg2:#1a100d;--bg3:#221510;--border:#2e1e18;--border2:#3e2820;
    --text:#f5ede8;--text2:#c4a090;--text3:#8a6858;--text4:#4a3028;
    --red-light:#1f0808;--accent-light:#181d3a;--accent2-light:#28101e;
    --green-light:#091c12;--amber-light:#1e1608;--purple-light:#160e28;
    --shadow:0 1px 3px rgba(0,0,0,0.4),0 4px 12px rgba(0,0,0,0.3);
    --shadow-lg:0 4px 24px rgba(0,0,0,0.5);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;transition:background 0.3s,color 0.3s;}

  /* ── TOPNAV ── */
  .topnav{position:sticky;top:0;z-index:200;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1rem;height:56px;gap:8px;box-shadow:var(--shadow);}
  .nav-brand{display:flex;align-items:center;gap:6px;font-weight:800;font-size:0.85rem;color:var(--text);white-space:nowrap;flex-shrink:0;text-decoration:none;}
  .nav-brand .jp-badge{background:var(--red);color:#fff;font-family:'Noto Serif JP',serif;font-size:0.8rem;padding:3px 7px;border-radius:6px;}
  .nav-brand .brand-text{display:none;}
  @media(min-width:500px){.nav-brand .brand-text{display:inline;}}
  .nav-link{display:flex;align-items:center;gap:5px;padding:5px 11px;border:1px solid var(--border);background:var(--bg3);border-radius:8px;font-size:0.72rem;font-weight:600;color:var(--text3);text-decoration:none;transition:all 0.2s;white-space:nowrap;flex-shrink:0;}
  .nav-link:hover{border-color:var(--red);color:var(--red);background:var(--red-light);}
  .nav-search{flex:1;position:relative;min-width:0;}
  .nav-search svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--text3);pointer-events:none;}
  .nav-search input{width:100%;height:34px;padding:0 10px 0 30px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.8rem;color:var(--text);outline:none;transition:all 0.2s;}
  .nav-search input::placeholder{color:var(--text4);}
  .nav-search input:focus{border-color:var(--red);background:var(--bg2);box-shadow:0 0 0 3px var(--red-light);}
  .theme-btn{width:34px;height:34px;border:1px solid var(--border);background:var(--bg3);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.9rem;transition:all 0.2s;flex-shrink:0;}
  .count-chip{font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--text3);white-space:nowrap;flex-shrink:0;background:var(--bg3);border:1px solid var(--border);padding:3px 8px;border-radius:20px;display:none;}
  @media(min-width:400px){.count-chip{display:block;}}
  @media(max-width:479px){
    .topnav{padding:0 0.6rem;gap:4px;}
    .nav-link{padding:5px 7px;font-size:0.66rem;}
  }

  /* ── SUBBAR ── */
  .subbar{position:sticky;top:56px;z-index:190;background:var(--bg2);border-bottom:1px solid var(--border);}
  .bab-row{display:flex;align-items:center;gap:6px;padding:8px 1rem;overflow-x:auto;scrollbar-width:none;}
  .bab-row::-webkit-scrollbar{display:none;}
  .bab-label{font-family:'JetBrains Mono',monospace;font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text4);white-space:nowrap;flex-shrink:0;}
  .bab-scroller{display:flex;gap:3px;}
  .bab-btn{width:28px;height:26px;border:1px solid var(--border);background:transparent;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:0.65rem;font-weight:600;color:var(--text3);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .bab-btn:hover{border-color:var(--red);color:var(--red);background:var(--red-light);}
  .bab-btn.active{background:var(--red)!important;color:#fff!important;border-color:var(--red)!important;}

  /* ── SECTION TYPE TABS ── */
  .type-tabs{display:flex;gap:4px;padding:6px 1rem;border-top:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
  .type-tabs::-webkit-scrollbar{display:none;}
  .type-tab{display:flex;align-items:center;gap:5px;padding:5px 12px;border:1px solid var(--border);background:transparent;border-radius:20px;font-size:0.7rem;font-weight:700;color:var(--text3);cursor:pointer;transition:all 0.15s;white-space:nowrap;font-family:'Plus Jakarta Sans',sans-serif;}
  .type-tab:hover{border-color:var(--red);color:var(--red);background:var(--red-light);}
  .type-tab.active{background:var(--red);color:#fff;border-color:var(--red);}
  .type-tab .tab-dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:0.7;}

  /* ── MAIN ── */
  main{max-width:900px;margin:0 auto;padding:1rem 0.75rem 6rem;}

  /* ── HERO ── */
  .page-hero{background:linear-gradient(135deg,#8b1a14 0%,#d4231a 40%,#e8376e 80%,#f59e0b 100%);border-radius:var(--radius);padding:1.4rem 1.2rem;margin-bottom:1rem;position:relative;overflow:hidden;color:white;}
  .page-hero::before{content:'練習';position:absolute;right:-10px;top:50%;transform:translateY(-50%);font-family:'Noto Serif JP',serif;font-size:5.5rem;font-weight:700;opacity:0.1;line-height:1;pointer-events:none;user-select:none;}
  .hero-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.18);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.25);padding:3px 10px;border-radius:20px;font-size:0.68rem;font-weight:600;letter-spacing:0.07em;margin-bottom:0.5rem;}
  .hero-title{font-size:clamp(1.4rem,5vw,2rem);font-weight:800;line-height:1.1;}
  .hero-title .jp{font-family:'Noto Serif JP',serif;font-size:0.55em;opacity:0.8;display:block;margin-top:2px;}
  .hero-sub{font-size:0.75rem;opacity:0.7;margin-top:0.4rem;}

  /* ── SECTION ── */
  .section{margin-bottom:1.2rem;animation:fadeUp 0.3s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .section-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
  .section-head{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg3);border-bottom:1px solid var(--border);}
  .section-bab{font-family:'JetBrains Mono',monospace;font-size:0.58rem;letter-spacing:0.1em;text-transform:uppercase;padding:2px 8px;border-radius:4px;background:var(--red);color:white;font-weight:700;white-space:nowrap;}
  .section-type-badge{font-family:'JetBrains Mono',monospace;font-size:0.58rem;letter-spacing:0.06em;text-transform:uppercase;padding:2px 8px;border-radius:4px;font-weight:700;white-space:nowrap;}
  .badge-A{background:var(--red-light);color:var(--red);border:1px solid var(--red);}
  .badge-B{background:var(--accent-light);color:var(--accent);border:1px solid var(--accent);}
  .badge-C{background:var(--green-light);color:#15803d;border:1px solid #22c55e;}
  .badge-M{background:var(--amber-light);color:#b45309;border:1px solid var(--amber);}
  .section-title{font-size:0.84rem;font-weight:700;color:var(--text);flex:1;}
  .section-jp{font-family:'Noto Serif JP',serif;font-size:0.72rem;color:var(--text3);}

  /* ── RENSHUU A ── pattern table */
  .renshuu-a-wrap{padding:12px 14px;}
  .ra-desc{font-size:0.78rem;color:var(--text3);margin-bottom:10px;font-style:italic;}
  .ra-pattern{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:10px;}
  .ra-formula{font-family:'Noto Serif JP',serif;font-size:1rem;font-weight:500;color:var(--text);margin-bottom:8px;line-height:1.6;}
  .ra-formula .slot{color:var(--red);font-weight:600;}
  .ra-table{width:100%;border-collapse:collapse;}
  .ra-table td{padding:5px 8px;font-size:0.82rem;border-bottom:1px solid var(--border);color:var(--text2);}
  .ra-table tr:last-child td{border-bottom:none;}
  .ra-table .cell-jp{font-family:'Noto Serif JP',serif;font-size:0.9rem;color:var(--text);}
  .ra-table .cell-rom{font-family:'JetBrains Mono',monospace;font-size:0.62rem;color:var(--accent);font-style:italic;}
  .ra-num{font-family:'JetBrains Mono',monospace;font-size:0.55rem;color:var(--text4);width:22px;text-align:right;}

  /* ── RENSHUU B ── interactive drill */
  .rb-list{padding:0;}
  .rb-item{border-bottom:1px solid var(--border);padding:14px 16px;}
  .rb-item:last-child{border-bottom:none;}
  .rb-num{font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--text4);margin-bottom:6px;}
  .rb-prompt{font-family:'Noto Serif JP',serif;font-size:0.95rem;color:var(--text);line-height:1.7;margin-bottom:8px;}
  .rb-prompt .cue{color:var(--red);font-weight:600;}
  .rb-prompt .blank{display:inline-block;min-width:80px;border-bottom:2px solid var(--red);margin:0 3px;color:transparent;user-select:none;}
  .rb-answer-row{display:flex;align-items:center;gap:8px;margin-top:8px;}
  .rb-input{flex:1;height:36px;padding:0 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;font-family:'Noto Serif JP',serif;font-size:0.9rem;color:var(--text);outline:none;transition:all 0.2s;}
  .rb-input:focus{border-color:var(--red);background:var(--bg2);box-shadow:0 0 0 3px var(--red-light);}
  .rb-input.correct{border-color:var(--green)!important;background:var(--green-light)!important;}
  .rb-input.wrong{border-color:#ef4444!important;background:#fee2e2!important;}
  .rb-check{padding:0 14px;height:36px;background:var(--red);color:white;border:none;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:0.72rem;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
  .rb-check:hover{background:#b91c1c;}
  .rb-reveal{padding:0 14px;height:36px;background:transparent;color:var(--text3);border:1px solid var(--border);border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;font-size:0.72rem;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
  .rb-reveal:hover{border-color:var(--amber);color:var(--amber);}
  .rb-feedback{font-size:0.75rem;margin-top:6px;padding:5px 10px;border-radius:6px;display:none;font-weight:600;}
  .rb-feedback.ok{background:var(--green-light);color:#15803d;display:block;}
  .rb-feedback.ng{background:#fee2e2;color:#dc2626;display:block;}
  .rb-feedback .ans{font-family:'Noto Serif JP',serif;font-size:0.85rem;}

  /* ── RENSHUU C ── dialogue */
  .rc-list{padding:12px 14px;}
  .rc-item{margin-bottom:14px;padding:12px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;}
  .rc-item:last-child{margin-bottom:0;}
  .rc-scene{font-size:0.7rem;color:var(--text3);font-style:italic;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
  .rc-line{display:flex;gap:8px;margin-bottom:6px;align-items:flex-start;}
  .rc-speaker{font-family:'JetBrains Mono',monospace;font-size:0.6rem;font-weight:700;padding:2px 6px;border-radius:4px;white-space:nowrap;flex-shrink:0;margin-top:2px;}
  .rc-sp-A{background:var(--red-light);color:var(--red);}
  .rc-sp-B{background:var(--accent-light);color:var(--accent);}
  .rc-text{font-family:'Noto Serif JP',serif;font-size:0.9rem;color:var(--text);line-height:1.6;}
  .rc-text .fill{color:var(--red);font-weight:600;background:var(--red-light);padding:0 4px;border-radius:3px;}
  .rc-rom{font-family:'JetBrains Mono',monospace;font-size:0.58rem;color:var(--accent);font-style:italic;margin-top:1px;}
  .rc-id{font-size:0.75rem;color:var(--text2);margin-top:1px;}

  /* ── MONDAI ── */
  .mondai-list{padding:12px 14px;}
  .mondai-item{margin-bottom:16px;padding:12px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;}
  .mondai-item:last-child{margin-bottom:0;}
  .mondai-q-num{font-family:'JetBrains Mono',monospace;font-size:0.58rem;color:var(--text4);margin-bottom:4px;}
  .mondai-instruction{font-size:0.72rem;color:var(--text3);margin-bottom:8px;font-style:italic;}
  .mondai-q{font-family:'Noto Serif JP',serif;font-size:0.95rem;color:var(--text);line-height:1.7;margin-bottom:8px;}
  .mondai-options{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
  .mondai-opt{padding:5px 14px;border:1px solid var(--border);background:var(--bg2);border-radius:20px;font-family:'Noto Serif JP',serif;font-size:0.82rem;color:var(--text2);cursor:pointer;transition:all 0.15s;}
  .mondai-opt:hover{border-color:var(--red);color:var(--red);background:var(--red-light);}
  .mondai-opt.selected{background:var(--red);color:white;border-color:var(--red);}
  .mondai-opt.correct{background:var(--green-light)!important;color:#15803d!important;border-color:var(--green)!important;}
  .mondai-opt.wrong{background:#fee2e2!important;color:#dc2626!important;border-color:#ef4444!important;}
  .mondai-fill-row{display:flex;align-items:center;gap:8px;}
  .mondai-fill{flex:1;height:36px;padding:0 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;font-family:'Noto Serif JP',serif;font-size:0.9rem;color:var(--text);outline:none;transition:all 0.2s;}
  .mondai-fill:focus{border-color:var(--red);box-shadow:0 0 0 3px var(--red-light);}
  .mondai-fill.correct{border-color:var(--green)!important;background:var(--green-light)!important;}
  .mondai-fill.wrong{border-color:#ef4444!important;background:#fee2e2!important;}
  .mondai-check-btn{padding:0 14px;height:36px;background:var(--red);color:white;border:none;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:0.72rem;cursor:pointer;transition:all 0.2s;}
  .mondai-check-btn:hover{background:#b91c1c;}
  .mondai-feedback{font-size:0.75rem;margin-top:6px;padding:5px 10px;border-radius:6px;display:none;font-weight:600;}
  .mondai-feedback.ok{background:var(--green-light);color:#15803d;display:block;}
  .mondai-feedback.ng{background:#fee2e2;color:#dc2626;display:block;}
  .mondai-feedback .ans{font-family:'Noto Serif JP',serif;font-size:0.85rem;}

  /* Score bar */
  .score-bar{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--bg3);border-top:1px solid var(--border);}
  .score-label{font-family:'JetBrains Mono',monospace;font-size:0.62rem;color:var(--text3);}
  .score-val{font-family:'JetBrains Mono',monospace;font-size:0.75rem;font-weight:700;color:var(--red);}
  .score-reset{margin-left:auto;padding:3px 10px;background:transparent;border:1px solid var(--border);border-radius:6px;font-size:0.65rem;font-weight:600;color:var(--text4);cursor:pointer;transition:all 0.2s;}
  .score-reset:hover{border-color:var(--red);color:var(--red);}

  mark{background:rgba(212,35,26,0.2);color:inherit;border-radius:2px;padding:0 1px;}
  .empty-state{text-align:center;padding:2.5rem 1rem;color:var(--text3);font-size:0.9rem;}
  .empty-state .big{font-family:'Noto Serif JP',serif;font-size:2.5rem;display:block;opacity:0.2;margin-bottom:0.5rem;}
  footer{text-align:center;padding:1.2rem;font-family:'JetBrains Mono',monospace;font-size:0.6rem;letter-spacing:0.08em;color:var(--text4);border-top:1px solid var(--border);}
</style>
</head>
<body>

<nav class="topnav">
  <a class="nav-brand" href="javascript:void(0)">
    <span class="jp-badge">練習</span>
    <span class="brand-text">Minna no Nihongo</span>
  </a>
  <a class="nav-link" href="index.html">📖 Kosa Kata</a>
  <a class="nav-link" href="bunpou.html">📝 Bunpou</a>
  <div class="nav-search">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="9" r="6"/><path d="m15 15 3 3"/></svg>
    <input id="search" type="search" placeholder="Cari latihan...">
  </div>
  <span class="count-chip" id="count">—</span>
  <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
</nav>

<div class="subbar" id="subbar">
  <div class="bab-row">
    <span class="bab-label">BAB</span>
    <div class="bab-scroller" id="babBtns"></div>
  </div>
  <div class="type-tabs" id="typeTabs">
    <button class="type-tab active" data-type="all" onclick="switchType('all')"><span class="tab-dot"></span>Semua</button>
    <button class="type-tab" data-type="A" onclick="switchType('A')"><span class="tab-dot"></span>練習 A</button>
    <button class="type-tab" data-type="B" onclick="switchType('B')"><span class="tab-dot"></span>練習 B</button>
    <button class="type-tab" data-type="C" onclick="switchType('C')"><span class="tab-dot"></span>練習 C</button>
    <button class="type-tab" data-type="M" onclick="switchType('M')"><span class="tab-dot"></span>問題</button>
  </div>
</div>

<main>
  <div class="page-hero">
    <div class="hero-badge">🔴 練習 · RENSHUU</div>
    <h1 class="hero-title" id="heroTitle">Latihan Bab 1<span class="jp" id="heroJp">わたしは〜です · 練習</span></h1>
    <p class="hero-sub">Latihan interaktif A, B, C + Mondai · Minna no Nihongo Shokyuu I</p>
  </div>

  <div id="renshuuSections"></div>
  <div class="empty-state" id="emptyState" style="display:none">
    <span class="big">準備中</span>Latihan untuk bab ini sedang disiapkan.
  </div>
</main>

<footer>みんなの日本語 — 練習 · Renshuu Interactive · N5</footer>

<script>
// ═══════════════════════════════════════════════
//  DATA — BAB 1–25 RENSHUU A, B, C, MONDAI
// ═══════════════════════════════════════════════
const allRenshuu = {

// ─── BAB 1 ─────────────────────────────────────
1:{
  title:"わたしは〜です",jp:"自己紹介",
  sections:[
    {type:"A",title:"練習 A",items:[
      {formula:"[名前]は [国]じんです。",rows:[
        {jp:"わたしはミラーです。",rom:"Watashi wa Mirā desu.",note:"Saya adalah Miller."},
        {jp:"わたしはにほんじんです。",rom:"Watashi wa Nihonjin desu.",note:"Saya orang Jepang."},
        {jp:"あのひとはIMCのしゃいんです。",rom:"Ano hito wa IMC no shain desu.",note:"Orang itu pegawai IMC."},
      ]},
      {formula:"[名前]は [仕事]ではありません。",rows:[
        {jp:"ミラーさんはせんせいではありません。",rom:"Mirā-san wa sensei de wa arimasen.",note:"Miller bukan guru."},
        {jp:"さとうさんはがくせいではありません。",rom:"Satō-san wa gakusei de wa arimasen.",note:"Sato bukan mahasiswa."},
      ]},
    ]},
    {type:"B",title:"練習 B",items:[
      {num:"1",prompt:"〔れい〕ミラー・かいしゃいん →ミラーさんはかいしゃいんですか。",qs:[
        {q:"さとう・せんせい",a:"さとうさんはせんせいですか。",rom:"Satō-san wa sensei desu ka?"},
        {q:"ワット・いしゃ",a:"ワットさんはいしゃですか。",rom:"Watto-san wa isha desu ka?"},
        {q:"マリア・だいがくせい",a:"マリアさんはだいがくせいですか。",rom:"Maria-san wa daigakusei desu ka?"},
        {q:"キム・けんきゅうしゃ",a:"キムさんはけんきゅうしゃですか。",rom:"Kimu-san wa kenkyūsha desu ka?"},

// ═══════════════ SETUP ═══════════════
let isDark=false, currentBab=1, currentType='all', searchQ='';
let scores = {}; // {babN_secType_qIdx: 'correct'|'wrong'}

function toggleTheme(){
  isDark=!isDark;
  document.documentElement.setAttribute('data-theme',isDark?'dark':'light');
  document.getElementById('themeBtn').textContent=isDark?'☀️':'🌙';
}

function switchType(type){
  currentType=type;
  document.querySelectorAll('.type-tab').forEach(t=>t.classList.toggle('active',t.dataset.type===type));
  render();
}

// Bab buttons
const babBtnsEl=document.getElementById('babBtns');
for(let i=1;i<=25;i++){
  const btn=document.createElement('button');
  btn.className='bab-btn'+(i===1?' active':'');
  btn.textContent=i;
  btn.addEventListener('click',()=>{
    if(currentBab===i)return;
    currentBab=i;
    document.querySelectorAll('.bab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    searchQ='';
    document.getElementById('search').value='';
    const d=allRenshuu[i];
    document.getElementById('heroTitle').innerHTML=`Latihan Bab ${i}<span class="jp" id="heroJp">${d?d.title:''} · 練習</span>`;
    window.scrollTo({top:0,behavior:'smooth'});
    render();
  });
  babBtnsEl.appendChild(btn);
}

document.getElementById('search').addEventListener('input',e=>{
  searchQ=e.target.value.trim().toLowerCase();
  render();
});

// ─── RENDER ───────────────────────────────────────
function render(){
  const bab=allRenshuu[currentBab];
  const el=document.getElementById('renshuuSections');
  const empty=document.getElementById('emptyState');
  if(!bab){
    el.innerHTML='';
    document.getElementById('count').textContent='—';
    empty.style.display='block';
    return;
  }
  const secs=bab.sections.filter(s=>currentType==='all'||s.type===currentType);
  if(secs.length===0){el.innerHTML='';empty.style.display='block';document.getElementById('count').textContent='0';return;}
  empty.style.display='none';

  let totalQ=0;
  el.innerHTML=secs.map((sec,si)=>{
    if(sec.type==='A') return renderA(sec,si);
    if(sec.type==='B') return renderB(sec,si);
    if(sec.type==='C') return renderC(sec,si);
    if(sec.type==='M') return renderM(sec,si);
    return '';
  }).join('');

  // count
  secs.forEach(s=>{
    if(s.type==='B') s.items.forEach(g=>totalQ+=g.qs.length);
    if(s.type==='M') totalQ+=s.items.length;
  });
  document.getElementById('count').textContent=(totalQ>0?totalQ+' soal':secs.length+' bagian');
}

function renderA(sec,si){
  const pats=sec.items.map((pat,pi)=>`
    <div class="ra-pattern">
      <div class="ra-formula">${pat.formula.replace(/\[([^\]]+)\]/g,'<span class="slot">[$1]</span>')}</div>
      <table class="ra-table">${pat.rows.map((r,ri)=>`
        <tr>
          <td class="ra-num">${String(ri+1).padStart(2,'0')}</td>
          <td class="cell-jp">${r.jp}</td>
          <td class="cell-rom">${r.rom}</td>
          <td style="font-size:0.75rem;color:var(--text3);">${r.note}</td>
        </tr>`).join('')}</table>
    </div>`).join('');
  return `<div class="section" style="animation-delay:${si*0.05}s">
    <div class="section-card">
      <div class="section-head">
        <span class="section-bab">Bab ${currentBab}</span>
        <span class="section-type-badge badge-A">練習 A</span>
        <span class="section-title">${sec.title}</span>
      </div>
      <div class="renshuu-a-wrap">
        <p class="ra-desc">Pola kalimat — substitusi dan hafalan</p>
        ${pats}
      </div>
    </div>
  </div>`;
}

function renderB(sec,si){
  const groups=sec.items.map((g,gi)=>{
    const qsHTML=g.qs.map((q,qi)=>{
      const uid=`b${currentBab}_${si}_${gi}_${qi}`;
      return `<div class="rb-item">
        <div class="rb-num">れい ${g.num} — 問 ${qi+1}</div>
        <div class="rb-prompt">${q.q}</div>
        <div class="rb-answer-row">
          <input class="rb-input" id="inp_${uid}" type="text" placeholder="答えを入力...">
          <button class="rb-check" onclick="checkB('${uid}','${escQ(q.a)}')">確認</button>
          <button class="rb-reveal" onclick="revealB('${uid}','${escQ(q.a)}','${escQ(q.rom)}')">答え</button>
        </div>
        <div class="rb-feedback" id="fb_${uid}"></div>
      </div>`;
    }).join('');
    return `<div style="border-bottom:2px solid var(--border);padding-bottom:4px;margin-bottom:4px;">
      <div style="padding:8px 16px 4px;font-size:0.75rem;font-weight:700;color:var(--text3);font-family:'JetBrains Mono',monospace;">れい ${g.num}</div>
      <div style="padding:4px 16px 8px;font-size:0.82rem;color:var(--text2);font-family:'Noto Serif JP',serif;background:var(--red-light);border-left:3px solid var(--red);">${g.prompt}</div>
      ${qsHTML}
    </div>`;
  }).join('');
  return `<div class="section" style="animation-delay:${si*0.05}s">
    <div class="section-card">
      <div class="section-head">
        <span class="section-bab">Bab ${currentBab}</span>
        <span class="section-type-badge badge-B">練習 B</span>
        <span class="section-title">${sec.title}</span>
      </div>
      <div class="rb-list">${groups}</div>
    </div>
  </div>`;
}

function renderC(sec,si){
  const items=sec.items.map((item,ii)=>{
    const lines=item.lines.map(l=>`
      <div class="rc-line">
        <span class="rc-speaker ${l.sp==='A'?'rc-sp-A':'rc-sp-B'}">${l.sp}</span>
        <div>
          <div class="rc-text">${l.jp}</div>
          <div class="rc-rom">${l.rom}</div>
          <div class="rc-id">${l.id}</div>
        </div>
      </div>`).join('');
    return `<div class="rc-item">
      <div class="rc-scene">📍 ${item.scene}</div>
      ${lines}
    </div>`;
  }).join('');
  return `<div class="section" style="animation-delay:${si*0.05}s">
    <div class="section-card">
      <div class="section-head">
        <span class="section-bab">Bab ${currentBab}</span>
        <span class="section-type-badge badge-C">練習 C</span>
        <span class="section-title">${sec.title}</span>
      </div>
      <div class="rc-list">${items}</div>
    </div>
  </div>`;
}

function renderM(sec,si){
  const items=sec.items.map((item,qi)=>{
    const uid=`m${currentBab}_${si}_${qi}`;
    let inner='';
    if(item.type==='choice'){
      const opts=item.opts.map((o,oi)=>`
        <button class="mondai-opt" id="opt_${uid}_${oi}" onclick="checkChoice('${uid}','${escQ(o)}','${escQ(item.ans)}',${item.opts.length})">${o}</button>`).join('');
      inner=`<div class="mondai-options">${opts}</div>`;
    } else {
      inner=`<div class="mondai-fill-row">
        <input class="mondai-fill" id="inp_${uid}" type="text" placeholder="こたえ...">
        <button class="mondai-check-btn" onclick="checkFill('${uid}','${escQ(item.ans)}')">確認</button>
        <button class="rb-reveal" style="height:36px;padding:0 12px;" onclick="revealFill('${uid}','${escQ(item.ans)}')">答え</button>
      </div>`;
    }
    return `<div class="mondai-item">
      <div class="mondai-q-num">問 ${qi+1}</div>
      <div class="mondai-instruction">${item.instruction}</div>
      <div class="mondai-q">${item.q}</div>
      ${inner}
      <div class="mondai-feedback" id="mfb_${uid}"></div>
    </div>`;
  }).join('');
  return `<div class="section" style="animation-delay:${si*0.05}s">
    <div class="section-card">
      <div class="section-head">
        <span class="section-bab">Bab ${currentBab}</span>
        <span class="section-type-badge badge-M">問題</span>
        <span class="section-title">${sec.title}</span>
      </div>
      <div class="mondai-list">${items}</div>
    </div>
  </div>`;
}

// ─── INTERACTIVE ──────────────────────────────────
function escQ(s){return(s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');}

function normalize(s){return(s||'').trim().replace(/　/g,' ').toLowerCase();}

function checkB(uid,ans){
  const inp=document.getElementById('inp_'+uid);
  const fb=document.getElementById('fb_'+uid);
  if(!inp)return;
  const val=normalize(inp.value);
  const correct=normalize(ans);
  // flexible: check if main answer is included
  const mainAns=correct.split('……')[1]||correct;
  const ok=val===normalize(mainAns)||val===correct||correct.includes(val)&&val.length>2;
  inp.className='rb-input '+(ok?'correct':'wrong');
  fb.className='rb-feedback '+(ok?'ok':'ng');
  fb.innerHTML=ok?'✓ 正解！':'✗ もう一度。<span class="ans">答え: '+ans+'</span>';
}

function revealB(uid,ans,rom){
  const inp=document.getElementById('inp_'+uid);
  const fb=document.getElementById('fb_'+uid);
  if(!inp)return;
  inp.className='rb-input';
  fb.className='rb-feedback ng';
  fb.innerHTML='答え: <span class="ans">'+ans+'</span> <span style="font-family:monospace;font-size:0.6rem;color:var(--accent)">'+rom+'</span>';
}

function checkChoice(uid,selected,ans,total){
  const fb=document.getElementById('mfb_'+uid);
  const selNorm=normalize(selected);
  const ansNorm=normalize(ans);
  const ok=selNorm===ansNorm;
  for(let i=0;i<total;i++){
    const btn=document.getElementById('opt_'+uid+'_'+i);
    if(!btn)continue;
    btn.className='mondai-opt';
    if(normalize(btn.textContent)===ansNorm) btn.classList.add('correct');
    else if(normalize(btn.textContent)===selNorm&&!ok) btn.classList.add('wrong');
  }
  fb.className='mondai-feedback '+(ok?'ok':'ng');
  fb.innerHTML=ok?'✓ 正解！':'✗ 正解は: <span class="ans">'+ans+'</span>';
}

function checkFill(uid,ans){
  const inp=document.getElementById('inp_'+uid);
  const fb=document.getElementById('mfb_'+uid);
  if(!inp)return;
  const val=normalize(inp.value);
  const correct=normalize(ans);
  const ok=val===correct||(correct.includes('、')&&correct.split('、').every((p,i)=>val.includes(normalize(p))));
  inp.className='mondai-fill '+(ok?'correct':'wrong');
  fb.className='mondai-feedback '+(ok?'ok':'ng');
  fb.innerHTML=ok?'✓ 正解！':'✗ 答え: <span class="ans">'+ans+'</span>';
}

function revealFill(uid,ans){
  const inp=document.getElementById('inp_'+uid);
  const fb=document.getElementById('mfb_'+uid);
  if(!inp)return;
  inp.value=ans;
  inp.className='mondai-fill correct';
  fb.className='mondai-feedback ok';
  fb.innerHTML='答え: <span class="ans">'+ans+'</span>';
}

render();
</script>
